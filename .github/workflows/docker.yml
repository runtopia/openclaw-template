name: docker

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      image_version:
        description: 'Image version override (e.g. 1.2.3). Defaults to git ref.'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # git tag v1.2.3  →  image tags: 1.2.3  (pin-friendly)
            type=semver,pattern={{version}}
            # main branch     →  image tag: latest
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Resolve IMAGE_VERSION
        id: ver
        run: |
          if [ -n "${{ inputs.image_version }}" ]; then
            echo "value=${{ inputs.image_version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ steps.meta.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_VERSION=${{ steps.ver.outputs.value }}
            CACHEBUST_PLUGINS=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
