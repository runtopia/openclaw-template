<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🦞 OpenClaw</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'Space Grotesk', ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body class="font-sans bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
  <div class="w-full max-w-2xl">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🦞</div>
      <h1 class="text-3xl font-bold text-white">OpenClaw</h1>
      <p class="text-gray-400 mt-1">配置你的 AI 助手</p>
    </div>

    <!-- 状态提示 -->
    <div id="status-message" class="hidden mb-6 px-4 py-3 rounded-lg text-sm"></div>

    <!-- 配置表单 -->
    <div id="config-form" class="bg-gray-900 rounded-xl border border-gray-800 p-6 space-y-6">
      <h2 class="text-lg font-semibold text-white">API Key 配置</h2>
      <p class="text-sm text-gray-400 -mt-4">选择一个 Provider 并填入 API Key</p>

      <!-- Provider 选择 -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Provider</label>
        <select id="provider" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
          <option value="clawrouters">ClawRouters（推荐，支持多模型路由）</option>
          <option value="anthropic">Anthropic（Claude）</option>
          <option value="openai">OpenAI（GPT）</option>
          <option value="gemini">Google Gemini</option>
          <option value="openrouter">OpenRouter</option>
          <option value="deepseek">DeepSeek</option>
        </select>
      </div>

      <!-- API Key -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">API Key</label>
        <input id="api-key" type="password" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="输入你的 API Key" />
      </div>

      <!-- 渠道（可选） -->
      <div>
        <div class="flex items-center justify-between">
          <h3 class="text-sm font-medium text-gray-300">渠道（可选）</h3>
          <button type="button" id="toggle-channels" class="text-xs text-blue-400 hover:text-blue-300" data-open="false">展开</button>
        </div>
        <div id="channels-section" class="hidden mt-3 space-y-3">
          <!-- Telegram -->
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1">Telegram Bot Token</label>
            <input id="ch-telegram" type="password" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="@BotFather 获取的 token" />
          </div>
          <!-- Discord -->
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1">Discord Bot Token</label>
            <input id="ch-discord" type="password" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Discord bot token" />
          </div>
          <!-- Slack -->
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Slack Bot Token</label>
              <input id="ch-slack-bot" type="password" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Slack App Token</label>
              <input id="ch-slack-app" type="password" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" />
            </div>
          </div>
          <!-- 飞书 -->
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">飞书 App ID</label>
              <input id="ch-feishu-id" type="text" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">飞书 App Secret</label>
              <input id="ch-feishu-secret" type="password" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" />
            </div>
          </div>
          <!-- WhatsApp / 微信 -->
          <div class="flex gap-4">
            <label class="flex items-center gap-2 text-sm text-gray-300">
              <input id="ch-whatsapp" type="checkbox" class="rounded bg-gray-800 border-gray-600" />
              启用 WhatsApp
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-300">
              <input id="ch-wechat" type="checkbox" class="rounded bg-gray-800 border-gray-600" />
              启用 微信
            </label>
          </div>
        </div>
      </div>

      <!-- 提交按钮 -->
      <button id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-lg px-4 py-3 text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed" onclick="submitConfig()">
        保存并启动
      </button>
    </div>

    <!-- 成功页（隐藏） -->
    <div id="success-page" class="hidden bg-gray-900 rounded-xl border border-gray-800 p-8 text-center space-y-4">
      <div class="text-5xl">✅</div>
      <h2 class="text-xl font-semibold text-white">配置完成</h2>
      <p class="text-gray-400 text-sm">OpenClaw 正在启动...</p>
      <a href="/openclaw" class="inline-block mt-2 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-lg px-6 py-2.5 text-sm transition-colors">
        进入 OpenClaw WebUI
      </a>
    </div>
  </div>

  <script>
  // 渠道折叠切换
  document.getElementById('toggle-channels').addEventListener('click', function() {
    const section = document.getElementById('channels-section');
    const open = section.classList.toggle('hidden');
    this.textContent = open ? '展开' : '收起';
    this.dataset.open = open ? 'false' : 'true';
  });

  async function submitConfig() {
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = '配置中...';

    const apiKey = document.getElementById('api-key').value.trim();
    const provider = document.getElementById('provider').value;

    if (!apiKey) {
      showStatus('请填写 API Key', 'error');
      btn.disabled = false;
      btn.textContent = '保存并启动';
      return;
    }

    const payload = { apiKey, provider, channels: {} };

    const telegram = document.getElementById('ch-telegram').value.trim();
    if (telegram) payload.channels.telegram = { botToken: telegram };

    const discord = document.getElementById('ch-discord').value.trim();
    if (discord) payload.channels.discord = { botToken: discord };

    const slackBot = document.getElementById('ch-slack-bot').value.trim();
    const slackApp = document.getElementById('ch-slack-app').value.trim();
    if (slackBot && slackApp) payload.channels.slack = { botToken: slackBot, appToken: slackApp };

    const feishuId = document.getElementById('ch-feishu-id').value.trim();
    const feishuSecret = document.getElementById('ch-feishu-secret').value.trim();
    if (feishuId && feishuSecret) payload.channels.feishu = { appId: feishuId, appSecret: feishuSecret };

    if (document.getElementById('ch-whatsapp').checked) payload.channels.whatsapp = { enabled: true };
    if (document.getElementById('ch-wechat').checked) payload.channels.wechat = { enabled: true };

    try {
      const res = await fetch('/setup/api/configure', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!data.ok) {
        showStatus(data.error || '配置失败', 'error');
        btn.disabled = false;
        btn.textContent = '保存并启动';
        return;
      }
      // 成功
      document.getElementById('config-form').classList.add('hidden');
      document.getElementById('success-page').classList.remove('hidden');
      // 自动刷新页面 / 跳转
      setTimeout(() => { window.location.href = '/openclaw'; }, 2000);
    } catch (err) {
      showStatus('请求失败: ' + err.message, 'error');
      btn.disabled = false;
      btn.textContent = '保存并启动';
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status-message');
    el.classList.remove('hidden', 'bg-green-900/50', 'text-green-300', 'bg-red-900/50', 'text-red-300');
    if (type === 'error') {
      el.classList.add('bg-red-900/50', 'text-red-300');
    } else {
      el.classList.add('bg-green-900/50', 'text-green-300');
    }
    el.textContent = msg;
  }
  </script>
</body>
</html>
